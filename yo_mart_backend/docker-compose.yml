services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: yomart_app
        working_dir: /var/www
        volumes:
            - .:/var/www
        depends_on:
            db:
                condition: service_healthy

    web:
        image: nginx:alpine
        container_name: yomart_web
        ports:
            - "8080:80"
        volumes:
            - .:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app

    db:
        image: postgres:16
        container_name: yomart_db
        environment:
            POSTGRES_DB: yomart_db
            POSTGRES_USER: panha
            POSTGRES_PASSWORD: Nha123
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U panha -d yomart_db"]
            interval: 5s
            timeout: 5s
            retries: 15
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        container_name: yomart_redis
        ports:
            - "6379:6379"
        restart: unless-stopped

volumes:
    pgdata:
